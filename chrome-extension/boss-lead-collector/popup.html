<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOSS Lead Collector</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f8fb;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
      }

      p {
        margin: 0 0 12px;
        color: #526071;
        font-size: 12px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        height: 36px;
        border: 0;
        border-radius: 6px;
        color: white;
        background: #00bebd;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.65;
      }

      button.secondary {
        margin-top: 8px;
        color: #172033;
        background: #e8edf5;
      }

      button.danger {
        margin-top: 8px;
        background: #d83a3a;
      }

      #status {
        margin-top: 10px;
        min-height: 18px;
        color: #526071;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>BOSS 线索采集</h1>
    <p>打开 BOSS 搜索结果页后点击开始。插件会滚动当前页面，采集公司名、岗位名和招聘证据，并下载 XLSX。</p>
    <button id="run">开始采集</button>
    <button id="stop" class="danger">停止并导出</button>
    <div id="status"></div>
    <script src="vendor/xlsx.full.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
